<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A9ED6"/>
      <stop offset="100%" stop-color="#A8D8F0"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e86ab"/>
      <stop offset="100%" stop-color="#145374"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="400" cy="88" r="60" fill="#FFD166"/>

  <!-- Sea -->
  <rect x="0" y="330" width="512" height="110" fill="url(#sea)"/>

  <!-- Wave crest -->
  <path d="M0 330 Q64 315 128 330 Q192 345 256 330 Q320 315 384 330 Q448 345 512 330
           L512 352 Q448 367 384 352 Q320 337 256 352 Q192 367 128 352 Q64 337 0 352 Z"
        fill="#48b8e0" opacity="0.8"/>
  <path d="M0 330 Q64 315 128 330 Q192 345 256 330 Q320 315 384 330 Q448 345 512 330"
        stroke="rgba(255,255,255,0.55)" stroke-width="5" fill="none"/>

  <!-- Beach / sand -->
  <path d="M0 428 Q256 415 512 428 L512 512 L0 512 Z" fill="#F4D35E"/>
  <rect x="0" y="440" width="512" height="72" fill="#F4D35E"/>

  <!-- === PERSON (navy silhouette, walking right) === -->
  <!-- Head -->
  <circle cx="186" cy="252" r="32" fill="#0c2d48"/>
  <!-- Body -->
  <rect x="174" y="282" width="24" height="82" rx="12" fill="#0c2d48"/>
  <!-- Left arm swinging back -->
  <line x1="186" y1="308" x2="144" y2="352" stroke="#0c2d48" stroke-width="20" stroke-linecap="round"/>
  <!-- Right arm forward (holding leash) -->
  <line x1="186" y1="308" x2="234" y2="332" stroke="#0c2d48" stroke-width="20" stroke-linecap="round"/>
  <!-- Left leg forward -->
  <line x1="186" y1="364" x2="162" y2="420" stroke="#0c2d48" stroke-width="20" stroke-linecap="round"/>
  <!-- Right leg back -->
  <line x1="186" y1="364" x2="214" y2="420" stroke="#0c2d48" stroke-width="20" stroke-linecap="round"/>

  <!-- Leash - coral coloured for contrast -->
  <path d="M234 332 C264 320 284 352 308 364" stroke="#e8735a" stroke-width="8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === DOG (navy silhouette) === -->
  <!-- Body -->
  <ellipse cx="348" cy="385" rx="48" ry="28" fill="#0c2d48"/>
  <!-- Head -->
  <circle cx="382" cy="358" r="26" fill="#0c2d48"/>
  <!-- Floppy ear -->
  <ellipse cx="396" cy="344" rx="12" ry="20" fill="#0c2d48" transform="rotate(28 396 344)"/>
  <!-- Tail wagging up -->
  <path d="M302 374 Q278 346 287 322" stroke="#0c2d48" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- 4 legs -->
  <line x1="364" y1="411" x2="358" y2="440" stroke="#0c2d48" stroke-width="14" stroke-linecap="round"/>
  <line x1="342" y1="413" x2="337" y2="440" stroke="#0c2d48" stroke-width="14" stroke-linecap="round"/>
  <line x1="322" y1="411" x2="326" y2="440" stroke="#0c2d48" stroke-width="14" stroke-linecap="round"/>
  <line x1="305" y1="408" x2="307" y2="440" stroke="#0c2d48" stroke-width="14" stroke-linecap="round"/>
  <!-- Nose dot (coral) -->
  <circle cx="402" cy="360" r="6" fill="#e8735a"/>
  <!-- Eye dot (white) -->
  <circle cx="389" cy="350" r="5" fill="white"/>
</svg>
